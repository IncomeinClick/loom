server {
    listen 80;
    server_name loom.YOURDOMAIN.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name loom.YOURDOMAIN.com;

    # SSL — Certbot will fill these in
    ssl_certificate     /etc/letsencrypt/live/loom.YOURDOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loom.YOURDOMAIN.com/privkey.pem;

    # Proxy to Loom (uvicorn on port 8000)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (live execution logs)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Larger body for file uploads (images, videos)
    client_max_body_size 50M;
}
